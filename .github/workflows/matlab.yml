# This workflow was generated using the GitHub Actions Workflow Generator for MATLAB.
# See https://matlab-actions.github.io/workflow-generator
name: MATLAB

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # Set up MATLAB and other MathWorks products on the runner.
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest
          cache: true
          # Set up additional products using the products input.
          # See https://github.com/matlab-actions/setup-matlab/#set-up-matlab
          # products: Simulink Deep_Learning_Toolbox


      # Run MATLAB scripts, functions, and statements.
- name: Restore license and run MATLAB (use MLM_LICENSE_FILE)
  run: |
    echo "$MATLAB_LICENSE" > /tmp/license.lic
    chmod 600 /tmp/license.lic
    export MLM_LICENSE_FILE="/tmp/license.lic"
    matlab -batch "WL_Script"
  env:
    MATLAB_LICENSE: ${{ secrets.MATLAB_LICENSE }}


