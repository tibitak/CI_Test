name: MATLAB

on:
  push:
    branches: [master] 
  pull_request:
    branches: [master]
  workflow_dispatch: {}
env:
  MLM_LICENSE_TOKEN: ${{ secrets.MYTOKEN }}

jobs:
  build:
    runs-on: self-hosted
    
    steps:
